name: IP2Free 每日自动领取奖励

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  claim_reward:
    runs-on: ubuntu-latest
    name: 执行领取奖励任务

    steps:
      - name: 获取项目代码
        uses: actions/checkout@v4

      - name: 执行领取脚本
        env:
          EMAIL: ${{ secrets.IP2FREE_EMAIL }}
          PASSWORD: ${{ secrets.IP2FREE_PASSWORD }}
          TG_BOT: ${{ secrets.TG_BOT }}
          UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
        run: |
          echo "=========================================="
          
          # 解析 TG_BOT 变量 (格式: chat_id,bot_token)
          IFS=',' read -r TG_CHAT_ID TG_TOKEN <<< "$TG_BOT"
          
          # 定义 Telegram 推送函数 (修改：打印真实报错响应)
          send_tg() {
            local result="$1"
            if [ -n "$TG_CHAT_ID" ] && [ -n "$TG_TOKEN" ]; then
              local current_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
              local msg="🌐 IP2Free 自动领取\n🕐 时间: $current_time\n📊 状态: $result"
              
              echo "⏳ 正在连接 Telegram 接口发送通知..."
              TG_RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\": \"${TG_CHAT_ID}\", \"text\": \"$msg\"}")
              
              echo "📨 TG 接口返回结果: $TG_RESPONSE"
            else
              echo "⚠️ TG_BOT 未配置或格式错误，跳过推送"
            fi
          }

          # 随机延迟（0-300秒，即最高5分钟）以规避风控
          DELAY=$((RANDOM % 300))
          echo "⏱️ 为了规避风控，随机延迟 ${DELAY} 秒后执行..."
          sleep $DELAY
          
          echo "🚀 开始登录程序..."
          echo "=========================================="
          
          # 1. 自动登录获取 Token
          LOGIN_RESPONSE=$(curl -s -X POST "https://api.ip2free.com/api/account/login?" \
            -H "User-Agent: $UA" \
            -H "Origin: https://www.ip2free.com" \
            -H "Referer: https://www.ip2free.com/" \
            -H "webname: IP2FREE" \
            -H "content-type: text/plain;charset=UTF-8" \
            -H "lang: cn" \
            --data-binary "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")

          TOKEN=$(echo "$LOGIN_RESPONSE" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')

          if [ -z "$TOKEN" ]; then
            echo "❌ 登录失败！"
            echo "服务器原始响应: $LOGIN_RESPONSE"
            send_tg "❌ 登录失败，请检查账号密码"
            exit 1
          fi

          echo "✅ 登录成功，Token 已就绪"

          echo "=========================================="
          echo "🔍 正在动态获取任务 ID..."
          
          LIST_RESPONSE=$(curl -s "https://api.ip2free.com/api/account/taskList?" \
            -H "User-Agent: $UA" \
            -H "x-token: $TOKEN" \
            -H "webname: IP2FREE" \
            -H "content-type: text/plain;charset=UTF-8" \
            -H "lang: cn" \
            --data-binary "{}")

          # 提取包含指定名称的任务 ID (已优化：使用多关键词模糊匹配，防止官方微调文案失效)
          TASK_ID=$(echo "$LIST_RESPONSE" | jq -r '.data.list[] | select(.task_name | contains("每天一次") and contains("点击就送")) | .id' | head -n 1)

          if [ -z "$TASK_ID" ] || [ "$TASK_ID" = "null" ]; then
            echo "⚠️ 未能动态获取到任务 ID，将使用默认推荐 ID 49130"
            TASK_ID=49130
          else
            echo "🎯 发现任务 ID: $TASK_ID"
          fi

          echo "🎁 正在尝试领取任务奖励 (ID: $TASK_ID)..."
          echo "=========================================="

          # 3. 执行领取奖励请求
          CLAIM_RESPONSE=$(curl -s -X POST "https://api.ip2free.com/api/account/finishTask?" \
            -H "User-Agent: $UA" \
            -H "Origin: https://www.ip2free.com" \
            -H "Referer: https://www.ip2free.com/" \
            -H "x-token: $TOKEN" \
            -H "webname: IP2FREE" \
            -H "content-type: text/plain;charset=UTF-8" \
            --data-binary "{\"id\":$TASK_ID}")

          echo "--- 领取结果处理 ---"
          echo "服务器响应: $CLAIM_RESPONSE"

          # 4. 逻辑判定及 TG 结果推送
          if echo "$CLAIM_RESPONSE" | grep -q '"code":0'; then
            echo "🎉 领取奖励成功！"
            send_tg "🎉 领取奖励成功！"
            exit 0
          elif echo "$CLAIM_RESPONSE" | grep -q '"code":-1'; then
            MSG=$(echo "$CLAIM_RESPONSE" | sed -n 's/.*"msg":"\([^"]*\)".*/\1/p')
            echo "💡 提示：$MSG (通常代表任务已完成)"
            send_tg "💡 提示：$MSG"
            exit 0
          else
            echo "❌ 发生未知错误，流水线判定为失败。"
            send_tg "❌ 发生未知错误，流水线判定为失败"
            exit 1
          fi
          echo "=========================================="
